name: "Glider"
description: "Why walk when you can glide?"

mainSettings: "Shared"
gliderSettings: "Gliding"
gliderDescription: "Gracefully glide through the air by double-jumping while your hands are unreadied, and you are moving neither forward nor backward.\nGliders and glider upgrades are only available through completing a quest."
surfSettings: "Shield Surfing"
surfDescription: "Slip down slopes on your shield by double-jumping while your hands are unreadied, and you are moving backward."

enableName: "Enable"
enableDescription: "Enable or disable this feature."
debugName: "Debug Mode"
fatigueCostName: "Glider Fatigue Cost"
fatigueCostDescription: "Fatigue cost per second while gliding. If you run out of Fatigue, you fall. Natural fatigue regeneration is halted while gliding."
conditionCostName: "Shield Surf Condition Cost"
conditionCostDescription: "Shield condition damage per second while surfing."
fallCostName: "Fall Condition Cost Factor"
fallCostDescription: "Influences how much damage your shield takes if you fall from too high. Lighter shields take less fall damage."

shadersName: "Enable Shaders"
shadersDescription: "Turn on or off shader effects."
deadzoneName: "Controller Deadzone"
deadzoneDescription: "Adjust the deadzone for determining if you are moving forward or backward. Only useful for analogue sticks."
volumeName: "Volume"
volumeDescription: "Sound effect volume factor."
chimTrickyName: "CHIM Tricky"
chimTrickyDescription: "Use a custom HUD while surfing."

